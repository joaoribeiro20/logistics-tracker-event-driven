name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test

      - name: Build Application
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/logistics-tracker:staging \
            .

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/logistics-tracker:staging

      - name: Deploy Staging
        run: |
          echo "Executar deploy staging aqui"
