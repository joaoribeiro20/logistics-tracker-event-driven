# ========================
# APPLICATION
# ========================
spring.application.name=logistics-tracker
server.port=${SERVER_PORT:8080}

# ========================
# DATABASE
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/logistics?sslmode=disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# RABBITMQ
# ========================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# ========================
# SWAGGER / OPENAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ========================
# ACTUATOR (Prometheus / Grafana)
# ========================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.export.prometheus.enabled=true

# ========================
# REDIS
# ========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=redis

# TTL GLOBAL CACHE (opcional)
spring.cache.redis.time-to-live=600000